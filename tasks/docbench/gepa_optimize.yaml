task_id: "docbench"
data_path: "data/docbench.json"
model_name: "qwen3-coder-30b-a3b"
prompt_name: "default"

# GEPA settings
reflection_lm: "gemini-3.1-pro-preview"
max_cost: 10.0
seed: 0

# Evaluation
eval_lm: "gemini-3-flash-preview"
agent_batch_size: 8
eval_batch_size: 16

# Data
max_examples: 40
train_ratio: 0.5

# Reflection
use_adaptation_guide: true

# Docker
use_docker: true
server_image: "docbench:latest"
